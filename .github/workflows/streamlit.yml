name: Streamlit App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 🔥 LINT STEP (NEW)
    - name: Run lint check
      run: |
        flake8 .

    # Optional: auto-format check (fails if not formatted)
    - name: Check formatting
      run: |
        black --check .

    # Run app (basic sanity check)
    - name: Run Streamlit app
      run: |
        python -m streamlit run app.py --server.headless true --server.port 8501 &
        sleep 10
        echo "Streamlit app started successfully"